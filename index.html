<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Финансы" />
    <title>Финансы</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="date-label" id="todayLabel">Сегодня</p>
          <h1>Финансы</h1>
        </div>
        <button class="icon-button" id="exportButton" type="button" aria-label="Экспорт данных">
          <span aria-hidden="true">↓</span>
        </button>
      </header>

      <main>
        <section class="screen active" id="expensesScreen" aria-labelledby="expensesTitle">
          <div class="summary-card">
            <div>
              <p class="section-label">Расходы за месяц</p>
              <h2 id="monthTotal">0</h2>
            </div>
            <div class="summary-note">
              <span id="expenseCount">0</span>
              <small>записей</small>
            </div>
          </div>

          <form class="entry-panel" id="expenseForm">
            <h3 id="expensesTitle">Добавить трату</h3>
            <label>
              Название
              <input id="expenseTitle" type="text" placeholder="Например: продукты" required />
            </label>
            <div class="two-columns">
              <label>
                Сумма
                <input id="expenseAmount" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0" required />
              </label>
              <label>
                Дата
                <input id="expenseDate" type="date" required />
              </label>
            </div>
            <label>
              Категория
              <select id="expenseCategory"></select>
            </label>
            <button class="primary-button" type="submit">Сохранить трату</button>
          </form>

          <section class="list-section">
            <div class="section-heading">
              <h3>Последние траты</h3>
              <button class="text-button" id="clearExpensesButton" type="button">Очистить</button>
            </div>
            <div class="expense-list" id="expenseList"></div>
          </section>
        </section>

        <section class="screen" id="statsScreen" aria-labelledby="statsTitle">
          <div class="section-heading">
            <h2 id="statsTitle">Статистика</h2>
            <input id="statsMonth" type="month" />
          </div>
          <div class="summary-card compact">
            <div>
              <p class="section-label">Итого за выбранный месяц</p>
              <h2 id="statsTotal">0</h2>
            </div>
          </div>
          <div class="stats-list" id="statsList"></div>
        </section>

        <section class="screen" id="categoriesScreen" aria-labelledby="categoriesTitle">
          <form class="entry-panel" id="categoryForm">
            <h2 id="categoriesTitle">Категории</h2>
            <label>
              Название категории
              <input id="categoryName" type="text" placeholder="Например: кафе" required />
            </label>
            <label>
              Цвет
              <input id="categoryColor" type="color" value="#0f766e" />
            </label>
            <button class="primary-button" type="submit">Добавить категорию</button>
          </form>
          <div class="category-list" id="categoryList"></div>
        </section>

        <section class="screen" id="depositScreen" aria-labelledby="depositTitle">
          <form class="entry-panel" id="depositForm">
            <h2 id="depositTitle">Калькулятор вклада</h2>
            <div class="two-columns">
              <label>
                Сумма вклада
                <input id="principal" type="number" min="0" step="0.01" inputmode="decimal" value="10000" />
              </label>
              <label>
                Ставка, % годовых
                <input id="annualRate" type="number" min="0" step="0.01" inputmode="decimal" value="18" />
              </label>
            </div>
            <div class="two-columns">
              <label>
                Срок, лет
                <input id="termYears" type="number" min="0" max="40" step="1" value="1" />
              </label>
              <label>
                Еще месяцев
                <input id="termMonths" type="number" min="0" max="11" step="1" value="0" />
              </label>
            </div>
            <label>
              Капитализация
              <select id="compoundingMode">
                <option value="daily">Дневная</option>
                <option value="monthly">Ежемесячная</option>
              </select>
            </label>
            <div class="two-columns">
              <label>
                Пополнение
                <input id="contributionAmount" type="number" min="0" step="0.01" inputmode="decimal" value="0" />
              </label>
              <label>
                Как часто
                <select id="contributionFrequency">
                  <option value="none">Без пополнений</option>
                  <option value="daily">Ежедневно</option>
                  <option value="biweekly">Каждые 2 недели</option>
                  <option value="monthly">Ежемесячно</option>
                </select>
              </label>
            </div>
            <button class="primary-button" type="submit">Рассчитать план</button>
          </form>

          <section class="deposit-report" id="depositReport"></section>
        </section>
      </main>

      <nav class="tabbar" aria-label="Главная навигация">
        <button class="tab active" type="button" data-screen="expensesScreen">
          <span>Траты</span>
        </button>
        <button class="tab" type="button" data-screen="statsScreen">
          <span>Статистика</span>
        </button>
        <button class="tab" type="button" data-screen="categoriesScreen">
          <span>Категории</span>
        </button>
        <button class="tab" type="button" data-screen="depositScreen">
          <span>Вклад</span>
        </button>
      </nav>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
